name: Release Dev

# Tags de desarrollo: vX.Y.Z-dev.N (pre-release SemVer).
# Ejemplo: v1.2.3-dev.4   (filtro glob, no regex)
on:
  push:
    tags:
      - 'v[0-9]*-dev.*'

permissions:
  contents: write  # necesario para que vpk cree el GitHub Release

env:
  PACK_ID: ACD-Dev
  CHANNEL: dev
  REPO_URL: https://github.com/LuisBDev/sgdfd-acd

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deriva la versión SemVer (sin la 'v'); conserva el sufijo -dev.N (pre-release válido).
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      # AcdVariant=Dev se embebe en el assembly → el build instalado se identifica como dev
      # (packId ACD-Dev, channel dev) sin depender de ASPNETCORE_ENVIRONMENT.
      - name: Publish
        run: |
          dotnet publish src/ACD/ACD.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:AcdVariant=Dev `
            -o publish/

      # Descarga el feed pre-release existente del canal dev (deltas + merge de RELEASES).
      - name: Download existing releases
        continue-on-error: true
        run: |
          vpk download github `
            --repoUrl ${{ env.REPO_URL }} `
            --channel ${{ env.CHANNEL }} `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --pre `
            --outputDir releases/

      - name: Pack with Velopack
        run: |
          vpk pack `
            --packId ${{ env.PACK_ID }} `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish/ `
            --outputDir releases/ `
            --channel ${{ env.CHANNEL }} `
            --mainExe ACD.exe `
            --packTitle "ACD Dev" `
            --icon src/ACD/acd.ico

      # vpk crea el GitHub Release marcado como pre-release y sube assets + manifiesto del canal dev.
      - name: Upload to GitHub Releases
        run: |
          vpk upload github `
            --repoUrl ${{ env.REPO_URL }} `
            --channel ${{ env.CHANNEL }} `
            --outputDir releases/ `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --publish `
            --pre `
            --merge `
            --releaseName "ACD Dev ${{ github.ref_name }}" `
            --tag ${{ github.ref_name }}
